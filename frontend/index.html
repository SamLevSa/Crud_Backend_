<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EcoService - Gestão de Doações</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>🌱 Sistema EcoService</h1>
        <p>Gerenciamento de doações integrado com o Django.</p>
        
        <div class="form-container">
            <h2>Cadastrar Nova Doação</h2>
            <form id="form-criar">
                <input type="text" id="nome_alimento" placeholder="Nome do Alimento" required>
                <input type="number" id="quantidade" placeholder="Quantidade" required>
                <input type="date" id="data_validade" required>

                <input type="text" id="destino" placeholder="Destino (Ex: ONG XYZ)" required>

                <button type="submit" class="btn-criar">Salvar Doação</button>
            </form>

        </div>

        <hr>

        <div class="pesquisa-container" style="margin-bottom: 15px;">
            <input type="text" id="input-pesquisa" placeholder="🔍 Pesquisar alimento..." onkeyup="pesquisarDoacao()" style="width: 100%; padding: 10px; border-radius: 4px; border: 1px solid #ccc;">
        </div>

        <div id="area-doacoes">
            <p>Carregando doações...</p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
